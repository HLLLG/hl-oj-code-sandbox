spring:
  application:
    name: hloj-code-sandbox
  jackson:
    parser:
      allow-unquoted-control-chars: true
server:
  port: 8080

code-sandbox:
  # native | docker
  type: native
  docker:
    # 远端 VMware 中的 Docker daemon（需在 VM 内开启 2375 远程 API，无 TLS 仅限可信内网）
    host: tcp://192.168.0.100:2375
    image: openjdk:21-slim
    memory-mb: 128
    cpu-count: 1
